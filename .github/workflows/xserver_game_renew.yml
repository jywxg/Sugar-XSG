name: XServer-Game-Renew
on:
  workflow_dispatch:
  schedule:
  - cron: "0 0,12 * * *"  # UTC 时间，对应北京时间 08:00 / 20:00

permissions:
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 拉取仓库
        uses: actions/checkout@v4

      - name: 🐍 安装 Python 依赖
        run: pip install requests --quiet

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      - name: 🔧 执行续期
        env:
          XSERVER_GAME_ACCOUNT: ${{ secrets.XSERVER_GAME_ACCOUNT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: python3 xserver_game_renew.py

      - name: 🧹 清理旧工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "开始清理旧的 GitHub Actions 运行记录..."
          gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/runs?per_page=100" \
            --jq '.workflow_runs[] | select(.status=="completed") | .id' | while read id
          do
            echo "删除运行记录: $id"
            gh api --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/actions/runs/$id" || true
          done
          echo "清理完成"
